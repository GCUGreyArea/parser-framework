rules:
  - id: 3cd579a8-fb20-4c59-84d8-2456d8d55f59
    name: FortiGateTrafficKV
    parser: kv
    bindings:
      - 5ceff8f3-1a41-4ed3-a292-c15e929e4c5d
    tokens:
      date: string
      time: string
      logid: string
      type: string
      subtype: string
      level: string
      vd: string
      eventtime: int
      srcip: ip
      srcname: string
      srcport: int
      srcintf: string
      dstip: ip
      dstname: string
      dstport: int
      dstintf: string
      proto: int
      action: string
      policyid: int
      service: string
      dstcountry: string
      srccountry: string
      trandisp: string
      transip: ip
      app: string
      appcat: string
      sentbyte: int
      rcvdbyte: int
      utmaction: string
    examples:
      - message: 'date=2017-11-15 time=11:44:16 logid="0000000013" type="traffic" subtype="forward" level="notice" vd="vdom1" eventtime=1510775056 srcip=10.1.100.155 srcname="pc1" srcport=40772 srcintf="port12" srcintfrole="undefined" dstip=35.197.51.42 dstname="fortiguard.com" dstport=443 dstintf="port11" dstintfrole="undefined" poluuid="707a0d88-cf9e-51e7-bbc7-4d421660557b" sessionid=22921 proto=6 action="close" policyid=1 policytype="policy" service="HTTPS" dstcountry="United States" srccountry="Reserved" trandisp="snat" transip=172.16.200.2 transport=40772 appid=40568 app="HTTPS.BROWSER" appcat="Web.Client" apprisk="medium" duration=2 sentbyte=1850 rcvdbyte=39898 sentpkt=25 rcvdpkt=37 utmaction="allow" countapp=1'
        expect:
          tokens:
            srcip: "10.1.100.155"
            dstip: "35.197.51.42"
            action: "close"
            service: "HTTPS"
            app: "HTTPS.BROWSER"
            utmaction: "allow"
          absent_tokens:
            - webacl_id
            - terminating_rule_id
