rules:
  - id: 3cd579a8-fb20-4c59-84d8-2456d8d55f59
    name: FortiGateTrafficKV
    parser: kv
    bindings:
      - 5ceff8f3-1a41-4ed3-a292-c15e929e4c5d
    tokens:
      date: string
      time: string
      logid: string
      type: string
      subtype: string
      level: string
      vd: string
      eventtime: int
      srcip: ip
      srcname: string
      srcport: int
      srcintf: string
      dstip: ip
      dstname: string
      dstport: int
      dstintf: string
      proto: int
      action: string
      policyid: int
      service: string
      dstcountry: string
      srccountry: string
      trandisp: string
      transip: ip
      app: string
      appcat: string
      sentbyte: int
      rcvdbyte: int
      utmaction: string
    examples:
      - message_file: 'messages/fortigate/traffic-close.log'
        expect:
          tokens:
            srcip: "10.1.100.155"
            dstip: "35.197.51.42"
            action: "close"
            service: "HTTPS"
            app: "HTTPS.BROWSER"
            utmaction: "allow"
          absent_tokens:
            - webacl_id
            - terminating_rule_id
