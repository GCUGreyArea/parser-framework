rules:
  - id: 4f8db6bf-6934-4d04-85bf-d4c431ebc0f6
    name: AWSWAFJson
    parser: json
    bindings:
      - 1c507cb9-91d4-4024-871d-49f38ee08f36
    tokens:
      format_version: int
      webacl_id: string
      terminating_rule_id: string
      action: string
      source_name: string
      source_id: string
      client_ip: ip
      country: string
      uri: string
      http_method: string
      request_id: string
    dynamic_properties:
      - 'if action == "BLOCK" and terminating_rule_id ?= "SQLi" then threat.event = "web_attack" and threat.source_ip = client_ip and threat.rule_name = terminating_rule_id and threat.severity = "high" and threat.outcome = action'
    json_matches:
      - path: "$.formatVersion"
        equals: "1"
      - path: "$.terminatingRuleType"
        equals: "REGULAR"
    json_tokens:
      format_version: "$.formatVersion"
      webacl_id: "$.webaclId"
      terminating_rule_id: "$.terminatingRuleId"
      action: "$.action"
      source_name: "$.httpSourceName"
      source_id: "$.httpSourceId"
      client_ip: "$.httpRequest.clientIp"
      country: "$.httpRequest.country"
      uri: "$.httpRequest.uri"
      http_method: "$.httpRequest.httpMethod"
      request_id: "$.httpRequest.requestId"
    examples:
      - message_file: 'messages/aws-waf/sqli-block.json'
        expect:
          tokens:
            format_version: 1
            action: "BLOCK"
            terminating_rule_id: "STMTest_SQLi_XSS"
            client_ip: "1.1.1.1"
            country: "AU"
            uri: "/"
            http_method: "POST"
            request_id: "aws-waf-request-001"
          properties:
            threat.event: "web_attack"
            threat.source_ip: "1.1.1.1"
            threat.rule_name: "STMTest_SQLi_XSS"
            threat.severity: "high"
            threat.outcome: "BLOCK"
          absent_tokens:
            - service
            - srcip
