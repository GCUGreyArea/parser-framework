messages:
  - id: 1c507cb9-91d4-4024-871d-49f38ee08f36
    name: AWS WAF
    message_filter:
      - pattern: '^\{.*"formatVersion":1.*"action":"(?<action>[A-Z]+)".*"clientIp":"(?<client_ip>[^"]+)".*\}$'
    sections:
      - id: aws_waf_payload
        parser: json
        ruleset: AWSWAFJson
    examples:
      - message_file: 'messages/aws-waf/sqli-block.json'
        expect:
          captures:
            action: "BLOCK"
            client_ip: "1.1.1.1"
