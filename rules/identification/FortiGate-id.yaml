messages:
  - id: 5ceff8f3-1a41-4ed3-a292-c15e929e4c5d
    name: FortiGate Traffic
    message_filter:
      - pattern: '^(?<fields>date=\d{4}-\d{2}-\d{2}\s+time=\d{2}:\d{2}:\d{2}.*\btype="traffic".*)$'
    sections:
      - extract: fields
        parser: kv
        ruleset: FortiGateTrafficKV
    examples:
